<!DOCTYPE html>
<html>
<head>
<title>MGIT Placement Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
padding:10px;
overflow-x:hidden;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
min-height:100vh;
}

/* Animated Background */
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Glow */
body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(0,198,255,0.15);
border-radius:50%;
top:-120px;
left:-120px;
filter:blur(100px);
animation:float1 10s infinite alternate;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:400px;
height:400px;
background:rgba(255,0,150,0.15);
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(100px);
animation:float2 12s infinite alternate;
z-index:-1;
}

@keyframes float1{
from{transform:translateY(0px);}
to{transform:translateY(80px);}
}

@keyframes float2{
from{transform:translateX(0px);}
to{transform:translateX(-80px);}
}

/* HEADER */
.header-box{
background:linear-gradient(135deg,#000814,#001d3d,#003566);
padding:4px 10px;
border-radius:12px 12px 0 0;
margin-bottom:0;
box-shadow:0 6px 20px rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.15);
border-bottom:none;
text-align:center;
}

/* HEADINGS */
h1{
font-size:26px;
font-weight:bold;
background:linear-gradient(90deg,#ffffff,#ffe082,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:4px;
letter-spacing:1px;
}

h3{
font-size:14px;
margin-top:1px;
font-weight:500;
background:linear-gradient(90deg,#b2ff59,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* FILTER SECTION GENERAL */
.filter-section {
display:flex;
flex-wrap:nowrap;
gap:4px;
padding:6px;
backdrop-filter:blur(10px);
box-shadow:0 6px 20px rgba(0,0,0,0.25);
border:1px solid rgba(255,255,255,0.15);
border-top:none;
align-items: center;
justify-content: space-between;
}

/* STATS BANNER */
.stats-banner {
display: flex;
flex-wrap: nowrap;
align-items: center;
gap: 3px;
background: rgba(0, 8, 20, 0.6);
padding: 6px;
border: 1px solid rgba(255,255,255,0.15);
border-bottom: 1px solid rgba(255,255,255,0.1);
justify-content: space-between;
}

.stat-card {
flex: 1 1 0px; 
background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
border: 1px solid rgba(255,255,255,0.15);
padding: 4px 1px;
border-radius: 4px;
text-align: center;
min-width: 35px;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.stat-card .card-label {
font-size: 8px;
text-transform: uppercase;
letter-spacing: 0.1px;
color: #ffe082;
font-weight: bold;
margin-bottom: 1px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.stat-card .card-value {
font-size: 11px;
font-weight: bold;
color: #ffffff;
}

.stats-divider {
font-size: 8px;
font-weight: 900;
color: #b2ff59;
text-transform: uppercase;
white-space: nowrap;
flex: 0 0 auto;
padding: 0 2px;
border-left: 2px solid rgba(255,255,255,0.2);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
line-height: 1.1;
text-align: center;
}

.controls {
background:rgba(255,255,255,0.12);
border-radius:0 0 12px 12px;
margin-bottom:6px;
border-top: 1px solid rgba(255,255,255,0.15);
overflow-x: hidden;
}

/* COMPACT FILTERS ROW CSS */
.filter-section input,
.filter-section select{
flex: 1 1 0px;
width: 7%;
min-width: 50px;
height:26px;
padding:2px 4px;
font-size:9px;
border-radius:4px;
border:1px solid rgba(255,255,255,0.2);
outline:none;
background:rgba(255,255,255,0.92);
color: #222;
text-overflow: ellipsis;
}

.filter-section input#search {
flex: 1.8 1 0px;
min-width: 100px;
}

.filter-section select#natureFilter {
flex: 1.2 1 0px;
min-width: 70px;
}

.filter-section input:focus,
.filter-section select:focus{
box-shadow:0 0 8px rgba(255,255,255,0.5);
border:1px solid #00c6ff;
}

/* TABLE CONTAINER */
.table-container{
width:100%;
overflow-x: auto;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.35);
background:rgba(255,255,255,0.05);
}

table{
border-collapse:collapse;
width:100%;
table-layout: auto;
background:#ffffff;
color:#222;
border-radius:12px;
overflow:hidden;
}
